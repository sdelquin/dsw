{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'css/custom.css' %}">

  <title>Eventum</title>
</head>
<body>
  <div class="container">
    <header>
      <a href="/" class="link-info text-decoration-none"><h1 class="mt-3"><i class="bi bi-calendar-heart"></i> Eventum</h1></a>
      <h3 class="text-secondary mb-4">Keep your events in mind!</h3>
    </header>

    <h4 class="display-6 mb-4">{% block heading %}{% endblock %}</h4>

    {% block contents %}
    {% endblock %}
  </div>
</body>
</html>
